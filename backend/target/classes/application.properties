spring.application.name=student-registration-backend

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/student_db}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Cloudinary Integration
cloudinary.cloud_name=${CLOUDINARY_CLOUD_NAME:default_cloud}
cloudinary.api_key=${CLOUDINARY_API_KEY:default_key}
cloudinary.api_secret=${CLOUDINARY_API_SECRET:default_secret}

# Server port
server.port=8080
